name: IndexNow

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.snaprecorder.org",
              "key": "4f1ea6214a4a428c95723d779b73b3c4",
              "keyLocation": "https://www.snaprecorder.org/4f1ea6214a4a428c95723d779b73b3c4.txt",
              "urlList": [
                "https://www.snaprecorder.org/",
                "https://www.snaprecorder.org/blog/",
                "https://www.snaprecorder.org/how-it-works/",
                "https://www.snaprecorder.org/loom-alternative/",
                "https://www.snaprecorder.org/screencastify-alternative/",
                "https://www.snaprecorder.org/screen-recorder-for-teachers/",
                "https://www.snaprecorder.org/webcam-overlay-presentation/",
                "https://www.snaprecorder.org/changelog/",
                "https://www.snaprecorder.org/about/",
                "https://www.snaprecorder.org/contact/",
                "https://www.snaprecorder.org/about/ghulam-muhammad/",
                "https://www.snaprecorder.org/blog/best-free-chrome-screen-recorder-extension/",
                "https://www.snaprecorder.org/blog/how-to-record-meetings-free-chrome/",
                "https://www.snaprecorder.org/blog/screen-recording-for-work-teams-guide/",
                "https://www.snaprecorder.org/blog/screen-recorder-no-account-no-sign-up/",
                "https://www.snaprecorder.org/blog/screen-recording-for-customer-support/",
                "https://www.snaprecorder.org/blog/snaprec-vs-screenity-chrome-recorder/",
                "https://www.snaprecorder.org/blog/async-video-messaging-vs-meetings/",
                "https://www.snaprecorder.org/blog/screen-recording-for-online-classes/",
                "https://www.snaprecorder.org/blog/how-to-create-video-bug-report/",
                "https://www.snaprecorder.org/blog/how-to-record-product-demo-sales/"
              ]
            }'
